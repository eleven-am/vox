services:
  vox:
    build:
      context: .
      target: vox
      args:
        BASE_IMAGE: nvidia/cuda:12.8.1-cudnn-runtime-ubuntu24.04
        ORT_GIT_REF: ${ORT_GIT_REF:-v1.24.0}
    ports:
      - "11435:11435"
    volumes:
      - vox-data:/home/vox/.vox
    environment:
      - VOX_DEVICE=auto
      - HF_HUB_ENABLE_HF_TRANSFER=0
      - DO_NOT_TRACK=1
      - HF_HUB_DISABLE_TELEMETRY=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  vox-cpu:
    build:
      context: .
      args:
        BASE_IMAGE: python:3.12-slim
    ports:
      - "11435:11435"
    volumes:
      - vox-data:/home/vox/.vox
    environment:
      - VOX_DEVICE=cpu
    profiles:
      - cpu

volumes:
  vox-data:
